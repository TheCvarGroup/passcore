name: Semantic Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-git-tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Semantic Release
      id: semantic
      uses: cycjimmy/semantic-release-action@v4
      with:
        semantic_version: 21
        extra_plugins: |
          @semantic-release/changelog
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Debug outputs
      if: always()
      run: |
        echo "new-release-published: ${{ steps.semantic.outputs.new_release_published }}"
        echo "new-release-git-tag: ${{ steps.semantic.outputs.new_release_git_tag }}"

  build-windows:
    needs: semantic-release
    if: needs.semantic-release.outputs.new-release-published == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.semantic-release.outputs.new-release-git-tag }}
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'src/Unosquare.PassCore.Web/ClientApp/package-lock.json'
        
    - name: Restore .NET dependencies
      run: dotnet restore
      
    - name: Build .NET solution
      run: dotnet build --configuration Release --no-restore
      
    - name: Install npm dependencies
      run: npm ci
      working-directory: src/Unosquare.PassCore.Web/ClientApp
      
    - name: Build frontend
      run: npm run build
      working-directory: src/Unosquare.PassCore.Web/ClientApp
      
    - name: Publish .NET application
      run: dotnet publish src/Unosquare.PassCore.Web/Unosquare.PassCore.Web.csproj --configuration Release --no-build --output ./publish --self-contained false
      
    - name: Set version info
      run: |
        $version = "${{ needs.semantic-release.outputs.new-release-git-tag }}"
        $buildDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        echo "Version: $version" > version.txt
        echo "Build Date: $buildDate" >> version.txt
        echo "Build Environment: GitHub Actions" >> version.txt
        echo "TAG_NAME=$version" >> $env:GITHUB_ENV
        
    - name: Create release archive
      run: |
        Compress-Archive -Path "./publish/*" -DestinationPath "passcore-${{ env.TAG_NAME }}-windows.zip"
        
    - name: Upload release assets
      run: |
        gh release upload ${{ env.TAG_NAME }} passcore-${{ env.TAG_NAME }}-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
